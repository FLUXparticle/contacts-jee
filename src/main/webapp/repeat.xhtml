<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Repeat</title>
</h:head>
<h:body>
    <h:form id="form1">
        <h:inputText id="input" value="#{repeatBean.input}" />
        <h:commandButton value="Submit" action="#{repeatBean.submit}">
            <f:ajax execute="form1" render="resultPanel" />
        </h:commandButton>
    </h:form>

    <h:panelGroup id="resultPanel">
        <h:outputText value="#{repeatBean.result}" />
    </h:panelGroup>
</h:body>
</html>
