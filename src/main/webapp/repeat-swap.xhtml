<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Repeat Tausch</title>
</h:head>
<h:body>
    <h:form id="swapForm">
        <h:inputText id="upperInput" value="#{repeatSwapBean.upperText}" />
        <h:inputText id="lowerInput" value="#{repeatSwapBean.lowerText}" />
        <h:commandButton id="swapButton" value="Tauschen" action="#{repeatSwapBean.swap}">
            <f:ajax execute="@form" render="@form" />
        </h:commandButton>
    </h:form>
</h:body>
</html>
